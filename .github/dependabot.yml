version: 2

updates:
  - package-ecosystem: "uv"
    open-pull-requests-limit: 0
    directory: "jobs/etl_jobs/internal/sync_recommendation"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "(BSR) chore(dependabot): "
    groups:
      sync-recommendation-security:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "uv"
    open-pull-requests-limit: 0
    directory: "."
    schedule:
      interval: "daily"
    commit-message:
      prefix: "(BSR) chore(dependabot): "
    groups:
      root-project-security:
        applies-to: security-updates
        patterns:
          - "*"
  - package-ecosystem: "uv"
    open-pull-requests-limit: 0
    directories:
      - "jobs/ml_jobs/*"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "(BSR) chore(dependabot): "
    groups:
      ml-jobs-security:
        applies-to: security-updates
        patterns:
          - "*"
