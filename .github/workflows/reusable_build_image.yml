name: "Build and register airflow docker image"

run-name: "Build image ${{ github.event.inputs.ENV }}"

on:
  workflow_call:
    inputs:
      GITHUB_ENV_NAME:
        type: string
        required: true
      TARGET_ENV:
        type: string
        required: true
      IS_MANUAL_DISPATCH:
        type: boolean
        required: true
      CUSTOM_TAG:
        type: string
        required: false
        default: ""
      SOURCE_PATH:
        type: string
        required: false
        default: "orchestration/k8s-airflow"
      CONTEXT_PATH:
        type: string
        required: false
        default: "."
      DOCKERFILE:
        type: string
        required: false
        default: "Dockerfile.k8s-worker"
      REGISTRY_BASE_NAME:
        type: string
        required: false
        default: "data-gcp/airflow"

    secrets:
      WORKLOAD_IDENTITY_PRD:
        required: true
      PASSCULTURE_GITHUB_ACTION_APP_ID:
        required: true
      PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY:
        required: true

env:
  DOCKER_REGISTRY_PROJECT_ID: "passculture-infra-prod"
  DOCKER_REGISTRY_REGION: "europe-west1"
  DOCKER_REGISTRY_REPOSITORY: "pass-culture-artifact-registry"
  SOURCE_PATH: ${{ inputs.SOURCE_PATH }}
  CONTEXT_PATH: ${{ inputs.CONTEXT_PATH }}
  TARGET_ENV: ${{ inputs.TARGET_ENV }}
  DOCKERFILE: ${{ inputs.DOCKERFILE }}
  REGISTRY_BASE_NAME: ${{ inputs.REGISTRY_BASE_NAME }}

jobs:
  build-and-push-docker-image:
    name: "Build image job"
    runs-on: ubuntu-latest
    environment: ${{ inputs.GITHUB_ENV_NAME }}
    env:
      CD_SERVICE_ACCOUNT: ${{ vars.AIRFLOW_CD_SERVICE_ACCOUNT }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: "Install uv"
        uses: astral-sh/setup-uv@v7
      - name: "Install cosign"
        uses: sigstore/cosign-installer@v3
      - name: Authenticate through github app ghactionci
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf
        id: github-token
        with:
          app-id: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_ID }}
          private-key: ${{ secrets.PASSCULTURE_GITHUB_ACTION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: passdirector
          permission-contents: read
      - name: "Install passdirector"
        run: |
          uv tool install --from "git+https://x-access-token:${{ steps.github-token.outputs.token }}@github.com/pass-culture/passdirector@main" passdirector
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: "Authenticate with Google Cloud"
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        id: auth
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PRD }}
          service_account: ${{ env.CD_SERVICE_ACCOUNT }}
          token_format: access_token
      - name: Docker login
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        id: docker-login
        with:
          registry: "${{ env.DOCKER_REGISTRY_REGION }}-docker.pkg.dev"
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v2.2.1
        with:
          driver: docker
      - name: "Get short SHA"
        id: "sha"
        run: echo "short_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: "Output variables"
        id: "vars"
        run: echo "DOCKER_REPO=${DOCKER_REGISTRY_REGION}-docker.pkg.dev/${DOCKER_REGISTRY_PROJECT_ID}/${DOCKER_REGISTRY_REPOSITORY}" | tee -a "$GITHUB_OUTPUT"
      - name: "Set Docker Tags"
        id: docker_tags
        env:
          CUSTOM_TAG: ${{ inputs.CUSTOM_TAG }}
          IS_MANUAL_DISPATCH: ${{ inputs.IS_MANUAL_DISPATCH }}
        run: |
          # Start with short SHA
          tags="${{ steps.vars.outputs.DOCKER_REPO }}/${REGISTRY_BASE_NAME}:${{ steps.sha.outputs.short_sha }}"

          # Add v1 tag if not manual
          if [ "${IS_MANUAL_DISPATCH}" != "true" ]; then
            tags="${tags}\n${{ steps.vars.outputs.DOCKER_REPO }}/${REGISTRY_BASE_NAME}:v1"
          fi

          # Add dev tag if dev environment
          if [ "${TARGET_ENV}" == "dev" ]; then
            tags="${tags}\n${{ steps.vars.outputs.DOCKER_REPO }}/${REGISTRY_BASE_NAME}:dev"
          fi

          # Add CUSTOM_TAG safely (user input) - supports comma-separated tags
          if [ -n "$CUSTOM_TAG" ]; then
            IFS=',' read -ra CUSTOM_TAGS <<< "$CUSTOM_TAG"
            for tag in "${CUSTOM_TAGS[@]}"; do
              sanitized_tag=$(printf '%s' "$tag" | tr '/ ' '--' | xargs)
              tags="${tags}\n${{ steps.vars.outputs.DOCKER_REPO }}/${REGISTRY_BASE_NAME}:${sanitized_tag}"
            done
          fi

          # Output tags
          echo -e "tags<<EOF\n$tags\nEOF" >> "$GITHUB_OUTPUT"
      - name: "Build local Docker image"
        run: |
          docker build \
          -f ${{ inputs.SOURCE_PATH }}/${{ inputs.DOCKERFILE }} \
          -t k8s-worker:latest \
          ${{ inputs.CONTEXT_PATH }}

      - name: "Push image with passdirector"
        env:
          TAGS: ${{ steps.docker_tags.outputs.tags }}
        run: |
          echo "$TAGS" | while read -r full_image_path; do
            if [ -n "$full_image_path" ]; then
              TAG="${full_image_path##*:}"
              image_name="${full_image_path%:*}"

              passdirector docker push \
                --source "k8s-worker:latest" \
                --destination "$image_name" \
                --tag "$TAG"
            fi
          done
