[project]
name = "adage"
version = "0.1.0"
description = "ETL pipeline to import cultural partner data and student engagement statistics from the ADAGE API into BigQuery"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "datetime>=4.3",
    "gcsfs>=2021.9.0",
    "google-auth-oauthlib>=0.4.6",
    "google-cloud-bigquery>=2.3.1",
    "google-cloud-bigquery-storage>=2.4.0",
    "google-cloud-core>=1.6.0",
    "google-cloud-secret-manager>=2.2.0",
    "google-cloud-storage>=1.38.0",
    "pandas>=1.3.3",
    "pandas-gbq>=0.15.0",
    "pyarrow>=3.0.0",
    "requests>=2.20.1",
]


[tool.uv.extra-build-dependencies]
pyarrow = ["pkg_resources"]


## ruff
# Recommended ruff config for now, to be updated as we go along.
[tool.ruff]
target-version = 'py312'

lint.select = ["E4", "E7", "E9", "F", "I"]
# TARGET : lint.select = [
#     "E",      # pycodestyle
#     "W",      # pycodestyle
#     "F",      # Pyflakes
#     "B",      # flake8-bugbear
#     "C4",     # flake8-comprehensions
#     "I",      # isort
#     "SIM",    # flake8-simplify
#     "TCH",    # flake8-type-checking
#     "TID",    # flake8-tidy-imports
#     "UP",     # pyupgrade
#     "PT",     # flake8-pytest-style
#     "RUF",    # Ruff-specific rules
#     "FBT001", # flake8-boolean-trap
# ]

[tool.ruff.lint.pydocstyle]
# Automatically disable rules that are incompatible with Google docstring convention
convention = "google"

[tool.ruff.lint.pycodestyle]
max-doc-length = 100

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-type-checking]
strict = true
runtime-evaluated-base-classes = ["pydantic.BaseModel"]
# Pydantic needs to be able to evaluate types at runtime
# see https://pypi.org/project/flake8-type-checking/ for flake8-type-checking documentation
# see https://beta.ruff.rs/docs/settings/#flake8-type-checking-runtime-evaluated-base-classes for ruff documentation
