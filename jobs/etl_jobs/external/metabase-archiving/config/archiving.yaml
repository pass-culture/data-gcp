max_cards_to_archive: 50

folders:
  - thematic
  - operationnel
  - adhoc

empty_collection_cleanup:
  root_collection_ids:
    - 608  # internal
    - 607  # external
    - 606  # operational

rules:
  - name: thematic_archiving
    sql: |
      WHERE
        is_thematic_collection
        AND total_views_6_months <= 5
        AND date(card_creation_date) < date_sub(current_date(), interval 60 day)

  - name: operationnel_archiving
    sql: |
      WHERE
        parent_folder = 'operationnel'
        AND days_since_last_execution >= 30
        AND date(card_creation_date) < date_sub(current_date(), interval 14 day)

  - name: adhoc_archiving
    sql: |
      WHERE
        parent_folder = 'adhoc'
        AND (
          days_since_last_execution >= 90
          OR total_views_6_months <= 5
        )
        AND date(card_creation_date) < date_sub(current_date(), interval 14 day)
