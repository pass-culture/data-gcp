archive_collection_id: 610
max_cards_to_archive: 50
# Cards that failed to soft-archive in the last N days are skipped on
# subsequent runs (e.g. Metabase remote-sync rejections). Set to null to
# disable the cooldown.
soft_archive_failure_cooldown_days: 30

soft_archive_rules:
  - name: thematic
    ancestor_title_pattern: "%suivi par thématiques%"
    min_age_days: 60
    min_days_since_update: 60   # protect cards still being edited
    views_window_months: 6
    max_views: 1  # strict less-than → archive only cards with 0 views in 6 months

  - name: adhoc
    ancestor_title_pattern: "%adhoc%"
    min_age_days: 15
    min_days_since_update: 15
    views_window_months: 3
    max_views: 5

hard_archive_cards:
  min_days_since_update: 30
  name_pattern: "^\\[Archive\\]"
  # ~10.8k stale cards backlog in the archive folder; 50/run is far too slow.
  # Each card = 1 API GET (+ 1 PUT when actually archived), no throttle between.
  max_cards: 500

empty_cleanup:
  min_age_days: 15
  min_days_since_update: 15   # don't touch dashboards/collections edited recently
  scan_root_collection_ids:
    - 608  # internal
    - 607  # external
    - 606  # operational
    - 610  # archive
