[project]
name = "metabase-docs"
version = "0.1.0"
description = "Enrich + reconcile Notion dashboard docs into int_metabase.dashboard_documentation"
requires-python = ">=3.13,<3.14"
dependencies = [
    "google-cloud-bigquery==3.40.1",
    "pandas==2.3.3",
    "pyarrow==23.0.1",
    "pydantic>=2.0",
    "pydantic-ai-slim[google]>=1.17.0",
    "typer==0.24.1",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.ruff]
target-version = "py313"

lint.select = ["E4", "E7", "E9", "F", "I"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.pycodestyle]
max-doc-length = 100

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-type-checking]
strict = true
runtime-evaluated-base-classes = ["pydantic.BaseModel"]
