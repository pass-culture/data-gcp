services:
  # Metabase application database (stores cards, dashboards, settings)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - metabase-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  # Sample database to create cards against (simulates BigQuery tables)
  sample-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SAMPLE_DB}
      POSTGRES_USER: ${SAMPLE_USER}
      POSTGRES_PASSWORD: ${SAMPLE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - sample-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SAMPLE_USER}"]
      interval: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.57.16
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${POSTGRES_DB}
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  metabase-data:
  sample-data:
