services:
  # Metabase application database (stores cards, dashboards, settings)
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase
    ports:
      - "5432:5432"
    volumes:
      - metabase-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 5s
      retries: 5

  # Sample database to create cards against (simulates BigQuery tables)
  sample-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sample
      POSTGRES_USER: sample
      POSTGRES_PASSWORD: sample
    ports:
      - "5433:5432"
    volumes:
      - sample-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sample"]
      interval: 5s
      retries: 5

  metabase:
    image: metabase/metabase:v0.57.15
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: metabase
      MB_DB_PASS: metabase
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  metabase-data:
  sample-data:
