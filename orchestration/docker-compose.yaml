volumes:
  postgres-db-volume:

x-airflow-common: &airflow-common
  env_file:
    - .env
  environment: &airflow-common-env
    SSL_CERT_FILE: /usr/local/share/ca-certificates/nscacert_combined.crt
    CLOUDSDK_CONFIG: /root/.config/gcloud
    CLOUDSDK_CORE_CUSTOM_CA_CERTS_FILE: /usr/local/share/ca-certificates/nscacert_combined.crt
    GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: '{"conn_type": "google_cloud_platform", "extra": {"key_path": null, "keyfile_dict": null, "no_auth": false, "project": "${GCP_PROJECT_ID}"}}'
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT_FORCE: "true"
    KUBECONFIG: /root/.kube/config
    AIRFLOW_CONN_KUBERNETES_DEFAULT: '{"conn_type": "kubernetes", "extra": {"kube_config_path": "/root/.kube/config", "cluster_context": "gke_passculture-data-ehp_europe-west1_data-gke-cluster-ehp", "in_cluster": false, "gcp_key_path": "/root/.config/gcloud/application_default_credentials.json"}}'
    AIRFLOW_CONN_KUBERNETES_DEFAULT_FORCE: "true"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./airflow/config/airflow.cfg:/opt/airflow/airflow.cfg
    - ./airflow/logs:/opt/airflow/logs
    - ./dags/data_gcp_dbt:/opt/airflow/data_gcp_dbt
    - ~/.config/gcloud:/root/.config/gcloud
    - ~/.kube:/root/.kube
    - ~/.config/gcloud/application_default_credentials.json:/root/.config/gcloud/application_default_credentials.json:ro
  user: root
  depends_on:
    - postgres

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 5s
      retries: 5
    restart: "unless-stopped"

  airflow-webserver:
    image: airflow-custom-image:latest
    hostname: airflow-webserver
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    command: webserver
    ports:
      - 8080:8080
    healthcheck:
      test: [ "CMD", "curl", "--fail", "localhost:8080/health" ]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: "unless-stopped"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    image: airflow-custom-image:latest
    hostname: airflow-scheduler
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://airflow-webserver:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: "unless-stopped"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  airflow-triggerer:
    image: airflow-custom-image:latest
    <<: *airflow-common
    environment:
      <<: *airflow-common-env
      CLOUDSDK_AUTH_DISABLE_CREDENTIALS_REFRESH: true
    command: triggerer
    ports:
      - "8794:8794"
    hostname: airflow-triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname airflow-triggerer']
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  airflow-init:
    build:
      context: ..
      dockerfile: ${DOCKERFILE_PATH:-orchestration/airflow/Dockerfile}
      target: final-builder
      args:
        - NETWORK_MODE=${NETWORK_MODE:-default}
    <<: *airflow-common
    command: "airflow db init && exit 0"
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _AIRFLOW_WWW_USER_EMAIL: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}admin@example.com
    restart: "no"
    image: airflow-custom-image:latest
    depends_on:
      postgres:
        condition: service_healthy

  sync-pools:
    <<: *airflow-common
    image: airflow-custom-image:latest
    entrypoint: ["/bin/bash", "-c"]
    command: ["/opt/airflow/.venv/bin/python", "/opt/airflow/sync_pools.py", "sync"]
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
      _AIRFLOW_WWW_USER_EMAIL: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}admin@example.com
    depends_on:
      postgres:
        condition: service_healthy
    restart: "on-failure"
